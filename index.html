<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Start</title>
    <style>
        body {
            font-family: 'Courier New', Courier, monospace;
            background-color: #000;
            color: #00ff00;
            text-align: center;
            margin: 0;
            height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            transition: background-color 0.5s, color 0.5s;
        }
        #start-screen { padding: 20px; }
        button {
            padding: 15px 30px;
            font-size: 18px;
            background-color: #ff4757;
            color: white;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            box-shadow: 0 4px 6px rgba(0,0,0,0.3);
            animation: pulse 1.5s infinite;
        }
        @keyframes pulse {
            0% { transform: scale(1); }
            50% { transform: scale(1.05); }
            100% { transform: scale(1); }
        }
        #scare-screen {
            display: none;
            font-size: 18px;
            color: #ff4757;
            text-align: left;
            width: 80%;
            max-width: 400px;
        }
        #reveal-screen {
            display: none;
            font-family: 'Arial', sans-serif;
            background-color: #ffe6ea;
            color: #d63031;
            width: 100%;
            height: 100%;
            justify-content: center;
            align-items: center;
            flex-direction: column;
            padding: 20px;
            box-sizing: border-box;
        }
        img {
            max-width: 90%;
            max-height: 50vh;
            border-radius: 15px;
            box-shadow: 0 10px 20px rgba(0,0,0,0.2);
            margin-bottom: 20px;
            object-fit: cover;
        }
        h1 { margin: 10px 0; font-size: 28px; }
        
        .flashing {
            animation: flashWarning 0.4s infinite alternate;
        }
        @keyframes flashWarning {
            from { background-color: #000; }
            to { background-color: #3a0000; }
        }
    </style>
</head>
<body>

    <div id="start-screen">
        <h2 style="color: white; font-family: Arial;">I made a small web app for our home planning ❤️</h2>
        <p style="color: #ccc; font-family: Arial;"></p>
        <button onclick="startPrank()">Start</button>
    </div>

    <div id="scare-screen">
        <div id="terminal-output"></div>
    </div>

    <div id="reveal-screen">
        <img src="Us.jpeg" alt="Us" onerror="alert('Image load failed! Check if the file is named EXACTLY Us.jpeg on GitHub.')">
        <h1>Happy April Fools!</h1>
        <h2>You my beautfool 🤡❤️</h2>
    </div>

    <script>
        let audioCtx;
        let sirenOsc;
        let sirenInterval;
        
        // Link to the famous Wow meme sound
        const wowAudio = new Audio("https://www.myinstants.com/media/sounds/anime-wow-sound-effect.mp3");

        function startSiren() {
            audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            if (audioCtx.state === "suspended") audioCtx.resume();

            sirenOsc = audioCtx.createOscillator();
            const gainNode = audioCtx.createGain();

            sirenOsc.type = "square"; 
            gainNode.gain.value = 1.0; 

            sirenOsc.connect(gainNode);
            gainNode.connect(audioCtx.destination);
            
            sirenOsc.start();

            let isHigh = false;
            sirenInterval = setInterval(() => {
                sirenOsc.frequency.setValueAtTime(isHigh ? 900 : 600, audioCtx.currentTime);
                isHigh = !isHigh;
            }, 400);
        }

        function stopSiren() {
            if (sirenOsc) {
                sirenOsc.stop();
                clearInterval(sirenInterval);
            }
        }

        function startPrank() {
            // Pre-load the meme sound silently so the browser allows it later
            wowAudio.play().then(() => {
                wowAudio.pause();
                wowAudio.currentTime = 0;
            }).catch(e => console.log("Audio prep failed, will try again"));

            // Start the scary siren and flashing
            startSiren();
            document.body.classList.add("flashing");

            document.getElementById("start-screen").style.display = "none";
            document.getElementById("scare-screen").style.display = "block";

            const logs = [
                "WARNING: UNRECOGNIZED DEVICE...",
                "BYPASSING SECURITY PROTOCOLS...",
                "ACCESSING WHATSAPP DATABASE...",
                "DOWNLOADING PRIVATE MEDIA...",
                "INITIATING MASS DELETION IN 3...",
                "2...",
                "1...",
                "FATAL ERROR: CUTE OVERLOAD DETECTED."
            ];

            let i = 0;
            const terminal = document.getElementById("terminal-output");

            const interval = setInterval(() => {
                if (i < logs.length) {
                    terminal.innerHTML += `<p>${logs[i]}</p>`;
                    i++;
                } else {
                    clearInterval(interval);
                    stopSiren();
                    document.body.classList.remove("flashing");
                    
                    // Show the photo and play the WOW sound!
                    setTimeout(() => {
                        showReveal();
                        wowAudio.play();
                    }, 200);
                }
            }, 1200);
        }

        function showReveal() {
            document.body.style.backgroundColor = "#ffe6ea";
            document.getElementById("scare-screen").style.display = "none";
            document.getElementById("reveal-screen").style.display = "flex";
        }
    </script>
</body>
</html>
